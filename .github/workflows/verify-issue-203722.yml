name: Verify issue 203722 on main (leaderless COMDAT crash)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Build clang@main and run reproducer
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout llvm-project main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: llvm/llvm-project
          ref: main
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build cmake ccache

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache --zero-stats

      - name: Restore ccache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v5.0.5
        with:
          path: ~/.ccache
          key: ccache-clang-x86-${{ github.run_id }}
          restore-keys: |
            ccache-clang-x86-

      - name: Configure (clang + X86 only)
        run: |
          cmake -B build -S llvm -G Ninja \
            -DLLVM_ENABLE_PROJECTS=clang \
            -DLLVM_TARGETS_TO_BUILD=X86 \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DCLANG_BUILD_TOOLS=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build clang and opt
        run: ninja -C build clang opt

      - name: Print ccache stats
        if: always()
        run: ccache --show-stats

      - name: Write minimal reproducer
        run: |
          cat > missing.ll << 'EOF'
          target triple = "x86_64-pc-windows-msvc"

          $missing_leader = comdat any
          @assoc = global i32 0, comdat($missing_leader)
          EOF

      - name: Run opt -verify to check verifier catches leaderless comdat
        id: verifier
        run: |
          set +e
          ./build/bin/opt -passes=verify missing.ll -o /dev/null 2>&1
          echo "verifier_exit=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Run clang to check backend crash
        id: repro
        run: |
          set +e
          ./build/bin/clang --target=x86_64-pc-windows-msvc -c missing.ll 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Collect clang crash reproducer files
        if: always()
        run: |
          mkdir -p crash-reproducers
          find /tmp -maxdepth 1 \( -name 'missing-*.ll' -o -name 'missing-*.sh' \) \
            2>/dev/null | xargs -I{} cp {} crash-reproducers/ || true

      - name: Upload crash reproducer files
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clang-crash-reproducers
          path: crash-reproducers/
          if-no-files-found: warn

      - name: Report result
        run: |
          VER=${{ steps.verifier.outputs.verifier_exit }}
          EXIT=${{ steps.repro.outputs.exit_code }}

          echo "--- verifier exit: $VER ---"
          if [ "$VER" -eq 127 ]; then
            echo "ERROR: opt not found (build issue)."
            exit 1
          elif [ "$VER" -ne 0 ]; then
            echo "VERIFIER catches the leaderless comdat (fix is working)."
          else
            echo "VERIFIER did NOT catch the leaderless comdat."
          fi

          echo "--- clang backend exit: $EXIT ---"
          # The clang driver wraps cc1; cc1 exits 70 on report_fatal_error but
          # the driver surfaces that as exit 1. Treat any non-zero as the crash.
          if [ "$EXIT" -ne 0 ]; then
            echo "BACKEND CRASH present: clang exited $EXIT."
          else
            echo "BACKEND did not crash."
          fi

          # Fail the job if the backend still crashes (verifier not catching it)
          [ "$EXIT" -eq 0 ] || exit 1
